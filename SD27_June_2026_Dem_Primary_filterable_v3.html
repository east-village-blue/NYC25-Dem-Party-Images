            // Reload the original or filtered datasets while preserving the saved map styling.
            function loadMapData(sourceDatasets) {
              const nextLoadedData = keplerGl.KeplerGlSchema.load(sourceDatasets, config);

              // Remove current copies first when this Kepler build exposes the action.
              if (typeof keplerGl.removeDataset === 'function') {
                sourceDatasets.forEach(function(dataset) {
                  try {
                    store.dispatch(keplerGl.removeDataset(dataset.data.id));
                  } catch (error) {
                    console.warn('Could not remove dataset before reload', error);
                  }
                });
              }

              store.dispatch(
                keplerGl.addDataToMap({
                  datasets: nextLoadedData.datasets,
                  config: nextLoadedData.config,
                  options: {centerMap: false}
                })
              );
            }

            // Linked filtering, faded context, automatic zoom, and ED highlighting.
            let activeSelectedEDs = [];
            let activeFocusED = null;
            let lastClickedED = null;

            function featureED(row) {
              const feature = row && row[0];
              const properties = feature && feature.properties;
              if (!properties || properties.AD0ED === undefined || properties.AD0ED === null) return null;
              return String(properties.AD0ED);
            }

            function isPieDataset(dataset) {
              return Boolean(dataset && dataset.data && Array.isArray(dataset.data.allData) &&
                dataset.data.allData.some(function(row) {
                  const feature = row && row[0];
                  const p = feature && feature.properties;
                  return p && p.AD0ED !== undefined &&
                    (p.candidate !== undefined || p.candidate_votes !== undefined);
                }));
            }

            function clone(value) { return JSON.parse(JSON.stringify(value)); }

            function collectPairs(value, output) {
              if (!Array.isArray(value)) return;
              if (value.length >= 2 && typeof value[0] === 'number' && typeof value[1] === 'number') {
                output.push([value[0], value[1]]);
                return;
              }
              value.forEach(function(item) { collectPairs(item, output); });
            }

            function boundsFor(selectedSet) {
              const pairs = [];
              datasets.forEach(function(dataset) {
                if (!dataset || !dataset.data || !Array.isArray(dataset.data.allData)) return;
                dataset.data.allData.forEach(function(row) {
                  const ed = featureED(row);
                  if (!ed || !selectedSet.has(ed)) return;
                  const feature = row && row[0];
                  if (feature && feature.geometry) collectPairs(feature.geometry.coordinates, pairs);
                });
              });
              if (!pairs.length) return null;
              let minLng=Infinity,maxLng=-Infinity,minLat=Infinity,maxLat=-Infinity;
              pairs.forEach(function(pair) {
                minLng=Math.min(minLng,pair[0]); maxLng=Math.max(maxLng,pair[0]);
                minLat=Math.min(minLat,pair[1]); maxLat=Math.max(maxLat,pair[1]);
              });
              return {minLng,maxLng,minLat,maxLat};
            }

            function viewFor(bounds) {
              if (!bounds) return null;
              const span = Math.max(
                Math.max(bounds.maxLng-bounds.minLng,0.0005),
                Math.max(bounds.maxLat-bounds.minLat,0.0005)*1.25
              );
              let zoom = Math.log2(0.16/span)+11.2; // about 50% farther out
              zoom = Math.max(10.2, Math.min(15.4, zoom));
              return {
                longitude:(bounds.minLng+bounds.maxLng)/2,
                latitude:(bounds.minLat+bounds.maxLat)/2,
                zoom:zoom
              };
            }

            function buildDisplay(selectedEDs, focusED) {
              const selectedSet = new Set((selectedEDs || []).map(String));
              const hasSelection = selectedSet.size > 0;
              const nextDatasets = [];
              const nextConfig = clone(config);
              const pieIds = [];

              datasets.forEach(function(dataset) {
                if (!isPieDataset(dataset)) {
                  nextDatasets.push(clone(dataset));
                  return;
                }
                const originalId=String(dataset.data.id);
                const selectedCopy=clone(dataset);
                const contextCopy=clone(dataset);
                const contextId=originalId+'_context';

                selectedCopy.data.allData=dataset.data.allData.filter(function(row) {
                  const ed=featureED(row);
                  return !hasSelection || (ed && selectedSet.has(ed));
                });
                contextCopy.data.id=contextId;
                contextCopy.data.label=(contextCopy.data.label||'Election pies')+' — context';
                contextCopy.data.allData=hasSelection ? dataset.data.allData.filter(function(row) {
                  const ed=featureED(row);
                  return ed && !selectedSet.has(ed);
                }) : [];

                nextDatasets.push(contextCopy);
                nextDatasets.push(selectedCopy);
                pieIds.push({main:originalId,context:contextId});
              });

              const layers=nextConfig.config.visState.layers||[];
              const rebuilt=[];
              layers.forEach(function(layer) {
                const match=pieIds.find(function(ids){return String(layer.config.dataId)===ids.main;});
                if (!match) { rebuilt.push(layer); return; }

                if (hasSelection) {
                  const contextLayer=clone(layer);
                  contextLayer.id=layer.id+'_context';
                  contextLayer.config.dataId=match.context;
                  contextLayer.config.label=(layer.config.label||'Election pies')+' — context';
                  contextLayer.config.visConfig.opacity=0.12;
                  contextLayer.config.visConfig.strokeOpacity=0.12;
                  contextLayer.config.visConfig.allowHover=false;
                  rebuilt.push(contextLayer);
                }

                const mainLayer=clone(layer);
                mainLayer.config.visConfig.opacity=0.92;
                mainLayer.config.visConfig.strokeOpacity=0.92;
                rebuilt.push(mainLayer);

                if (focusED) {
                  const source=datasets.find(function(ds){return ds && ds.data && String(ds.data.id)===match.main;});
                  if (source) {
                    const focusCopy=clone(source);
                    const focusId=match.main+'_focus';
                    focusCopy.data.id=focusId;
                    focusCopy.data.label=(focusCopy.data.label||'Election pies')+' — focused ED';
                    focusCopy.data.allData=source.data.allData.filter(function(row){return featureED(row)===String(focusED);});
                    nextDatasets.push(focusCopy);

                    const focusLayer=clone(layer);
                    focusLayer.id=layer.id+'_focus';
                    focusLayer.config.dataId=focusId;
                    focusLayer.config.label='Focused Election District';
                    focusLayer.config.visConfig.opacity=1;
                    focusLayer.config.visConfig.strokeOpacity=1;
                    focusLayer.config.visConfig.stroked=true;
                    focusLayer.config.visConfig.thickness=3;
                    focusLayer.config.visConfig.strokeColor=[255,235,59];
                    focusLayer.visualChannels.strokeColorField=null;
                    rebuilt.push(focusLayer);
                  }
                }
              });
              nextConfig.config.visState.layers=rebuilt;
              return {datasets:nextDatasets,config:nextConfig,selectedSet:selectedSet};
            }

            function renderLinked(options) {
              options=options||{};
              const display=buildDisplay(activeSelectedEDs,activeFocusED);
              loadMapData(display.datasets,display.config);

              if (options.zoom!==false && display.selectedSet.size && display.selectedSet.size<165) {
                const view=viewFor(boundsFor(display.selectedSet));
                if (view) {
                  window.setTimeout(function() {
                    try { store.dispatch(keplerGl.updateMap(view)); }
                    catch(error) { console.warn('Could not automatically zoom linked map',error); }
                  },250);
                }
              }
            }

            window.setTimeout(function() {
              loadMapData(datasets);
              if (window.parent && window.parent!==window) {
                window.parent.postMessage({type:'KEPLER_ED_MAP_READY',map:'SD27'},'*');
              }
            },500);

            window.addEventListener('message',function(event) {
              const message=event.data||{};
              if (message.map && message.map!=='SD27') return;
              if (message.type==='FILTER_EDS') {
                activeSelectedEDs=(message.eds||[]).map(String);
                renderLinked({zoom:message.zoom!==false});
              } else if (message.type==='FOCUS_ED') {
                activeFocusED=message.ed?String(message.ed):null;
                renderLinked({zoom:false});
              } else if (message.type==='CLEAR_FOCUS') {
                activeFocusED=null;
                renderLinked({zoom:false});
              }
            });

            store.subscribe(function() {
              try {
                const state=store.getState();
                const clicked=state && state.keplerGl && state.keplerGl.map &&
                  state.keplerGl.map.visState && state.keplerGl.map.visState.clicked;
                const object=clicked && (clicked.object||clicked);
                const properties=object && (object.properties||(object.data&&object.data.properties));
                const ed=properties && properties.AD0ED!==undefined?String(properties.AD0ED):null;
                if (ed && ed!==lastClickedED) {
                  lastClickedED=ed;
                  if (window.parent && window.parent!==window) {
                    window.parent.postMessage({type:'PIE_ED_CLICKED',map:'SD27',ed:ed},'*');
                  }
                }
              } catch(error) {}
            });

          }(KeplerGl, store))
